services:
  - type: web
    name: gadget-rental-ml-api
    runtime: python
    repo: https://github.com/rlibron/ml-backend
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0