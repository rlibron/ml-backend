services:
  - type: web
    name: gadget-rental-ml-api
    runtime: python
    repo: https://github.com/rlibron/ml-backend
    branch: main
    buildCommand: |
      python --version
      pip install --upgrade pip setuptools wheel
      pip install numpy==1.24.3 scikit-learn==1.3.0 --only-binary :all:
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.12